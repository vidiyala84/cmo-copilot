<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:800px;overflow:hidden}
body{background:radial-gradient(1200px 800px at 78% 18%,#151d3a 0%,#0b1020 60%);
  color:#e7ecf5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  position:relative;padding:78px 84px;display:flex;flex-direction:column;justify-content:center}
.eyebrow{color:#FF8431;font-weight:800;font-size:22px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:26px}
h1{font-size:118px;font-weight:800;letter-spacing:-.03em;line-height:.95}
h1 .d{color:#FF8431}
.tag{color:#9fb0d0;font-size:34px;margin-top:20px;font-weight:500}
.metric{margin-top:46px;display:flex;align-items:baseline;gap:22px}
.metric .big{font-size:96px;font-weight:800;letter-spacing:-.02em}
.metric .from{color:#7f8fb3}.metric .to{color:#2FB67C}
.metric .cap{color:#9fb0d0;font-size:26px;font-weight:500;max-width:16ch;line-height:1.25}
.foot{position:absolute;left:84px;bottom:64px;color:#8595bb;font-size:24px;font-weight:600;letter-spacing:.01em}
.foot b{color:#e7ecf5}
/* agent-society motif, top-right */
.motif{position:absolute;top:70px;right:84px;width:340px;height:340px;opacity:.9}
.node{fill:#1c2a4d;stroke:#3a4d82;stroke-width:2}
.node.risk{fill:#3a2a12;stroke:#FF8431}
.mem{fill:#123024;stroke:#2FB67C;stroke-width:2.5}
.edge{stroke:#2c3a5e;stroke-width:2}
.ntext{fill:#cdd8f0;font-size:17px;font-weight:700;font-family:-apple-system,sans-serif}
</style></head><body>
  <svg class="motif" viewBox="0 0 340 340">
    <line class="edge" x1="170" y1="170" x2="170" y2="46"/>
    <line class="edge" x1="170" y1="170" x2="290" y2="110"/>
    <line class="edge" x1="170" y1="170" x2="290" y2="230"/>
    <line class="edge" x1="170" y1="170" x2="170" y2="294"/>
    <line class="edge" x1="170" y1="170" x2="50" y2="230"/>
    <line class="edge" x1="170" y1="170" x2="50" y2="110"/>
    <circle class="node" cx="170" cy="46" r="30"/>
    <circle class="node" cx="290" cy="110" r="30"/>
    <circle class="node risk" cx="290" cy="230" r="30"/>
    <circle class="node" cx="170" cy="294" r="30"/>
    <circle class="node" cx="50" cy="230" r="30"/>
    <circle class="node" cx="50" cy="110" r="30"/>
    <circle class="mem" cx="170" cy="170" r="42"/>
    <text class="ntext" x="170" y="176" text-anchor="middle" fill="#7ee2ad">memory</text>
  </svg>

  <div class="eyebrow">Qwen Cloud Hackathon</div>
  <h1>CMO Copilot<span class="d">.</span></h1>
  <div class="tag">An AI copilot for marketing budgets.</div>
  <div class="metric">
    <div class="big"><span class="from">27%</span> → <span class="to">100%</span></div>
    <div class="cap">reliable — and it holds</div>
  </div>
  <div class="foot">A Qwen agent society that <b>learns from its own mistakes</b> · Alibaba Cloud Model Studio</div>
</body></html>
